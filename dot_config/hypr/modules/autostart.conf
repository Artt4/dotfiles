#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# ~/.config/hypr/modules/autostart.conf

exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP # 
exec-once = gnome-keyring-daemon --start --components=secrets

# Apps with specific workspace assignments
exec-once = [workspace 1 silent] vivaldi
exec-once = [workspace 10 silent] vesktop
exec-once = [workspace 10 silent] telegram-desktop
exec-once = [workspace 6 silent] spotify

# Background processes
exec-once = systemctl --user start hyprpolkitagent
exec-once = swaync
exec-once = ~/.config/waybar/scripts/launch.sh
exec-once = swww-daemon
exec-once = waypaper --restore
exec-once = nm-applet --indicator
exec-once = hyprpm reload -n
exec-once = snappy-switcher --daemon

# Clipboard management
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = wl-clip-persist --clipboard regular

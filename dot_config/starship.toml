"$schema" = 'https://starship.rs/config-schema.json'

format = """
[](nord_polar_medium)\
$os\
$username\
$hostname\
[](bg:nord_polar_light fg:nord_polar_medium)\
$directory\
[](bg:nord_frost fg:nord_polar_light)\
$git_branch\
$git_status\
[](bg:nord_aurora fg:nord_frost)\
$c\
$cpp\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
[](bg:nord_snow fg:nord_aurora)\
$docker_context\
$conda\
$pixi\
$cmd_duration\
[](fg:nord_snow)\
$line_break$character"""

palette = 'nord'

[palettes.nord]
# Colors mapped from your first snippet
nord_polar_dark   = '#2e3440' # Polar Night (Darkest)
nord_polar_medium = '#5e81ac' # Nord 10 (Used for OS/User)
nord_polar_light  = '#81a1c1' # Nord 9 (Used for Directory)
nord_frost        = '#88c0d0' # Nord 8 (Used for Git)
nord_aurora       = '#8fbcbb' # Nord 7 (Used for Languages)
nord_snow         = '#d9dee9' # Nord 4ish (Used for Duration/End)
nord_green        = '#a3be8c' 
nord_red          = '#bf616a'

[os]
disabled = false
style = "bg:nord_polar_medium fg:nord_polar_dark"

[os.symbols]
CachyOS = " "

[username]
show_always = true
style_user = "bg:nord_polar_medium fg:nord_polar_dark"
style_root = "bg:nord_polar_medium fg:nord_polar_dark"
format = '[$user]($style)' 

[hostname]
disabled = true # This ensures it never shows up

[directory]
style = "fg:nord_polar_dark bg:nord_polar_light"
format = "[ 󰉋 $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[git_branch]
symbol = "󰘬 "
style = "bg:nord_frost fg:nord_polar_dark"
format = '[ $symbol$branch ]($style)'

[git_status]
style = "bg:nord_frost fg:nord_polar_dark"
format = '[$all_status$ahead_behind]($style)'

# Language settings - using nord_aurora (#8fbcbb)
[c]
symbol = " "
style = "bg:nord_aurora fg:nord_polar_dark"
format = '[$symbol($version )]($style)'

[rust]
symbol = ""
style = "bg:nord_aurora fg:nord_polar_dark"
format = '[$symbol($version )]($style)'

[python]
symbol = "󰌠 "
style = "bg:nord_aurora fg:nord_polar_dark"
format = '[$symbol($version )]($style)'

[cmd_duration]
style = "bg:nord_snow fg:nord_polar_dark"
format = "[ 󰔚 $duration ]($style)"

[character]
success_symbol = '[ 󱞩](bold nord_green)'
error_symbol = '[ 󱞩](bold nord_red)'
